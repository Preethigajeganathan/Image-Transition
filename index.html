<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Transition</title>
    <link rel="stylesheet" href="Transition.css">
</head>
<body>
    <div class="container">
        <div class="img-box">
            <img src="images/transparent.png" alt="Transparent image" width="100%">

            <div class="img-wrap">
                <img src="images/original.jpg" id="originalImg" alt="Original image" >
            </div>

            <span id="slider">
                <img src="images/arrow.png" class="arrow" alt="Slider handle">
            </span>

        </div>
    </div>

    <script>
        var ImgBox = document.querySelector(".img-box");
        var imgWrap = document.querySelector(".img-wrap");
        var originalImg = document.getElementById("originalImg");
        var slider = document.getElementById("slider");

        originalImg.style.width = ImgBox.offsetWidth + "px";

       function moveSlider(x) {
         const rect = ImgBox.getBoundingClientRect();

       let boxwidth = x - rect.left;

       if (boxwidth < 0) boxwidth = 0;
       if (boxwidth > rect.width) boxwidth = rect.width;

       imgWrap.style.width = boxwidth + "px";
       slider.style.left = boxwidth + "px";
       }

      ImgBox.addEventListener("mousemove", function(e) {
      moveSlider(e.clientX);
      });

      ImgBox.addEventListener("touchmove", function(e) {
      moveSlider(e.touches[0].clientX);
      });

     window.addEventListener("resize", function() {
     originalImg.style.width = ImgBox.offsetWidth + "px";
     });
        
    </script>

</body>
</html>
<!-- removebg - to remove backround of the image -->
